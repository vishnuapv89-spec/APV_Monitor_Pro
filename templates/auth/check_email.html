<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Check Email - APV Monitor Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:white;
}

.card{
width:420px;
padding:40px;
border-radius:24px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,0.08);
text-align:center;
}

.logo{
font-weight:800;
font-size:20px;
margin-bottom:25px;
}

.icon{
font-size:48px;
margin-bottom:20px;
}

h2{
color:#00ffb3;
margin-bottom:10px;
}

.email{
font-weight:700;
margin:10px 0 20px 0;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
cursor:pointer;
}

.resend{
margin-top:15px;
display:block;
color:#3b82f6;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
APV Monitor Pro
</div>

<div class="icon">
📧
</div>

<h2>Check your email</h2>

<p>
We have sent an email with verification instructions to
</p>

<div class="email">
{{ email }}
</div>

<button class="btn">
Open Gmail
</button>

<a class="resend" href="/resend-confirmation">
Resend confirmation email
</a>

</div>

</body>
</html>
